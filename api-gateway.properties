spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Actuator
management.endpoints.web.exposure.include=*

# Gateway Discovery
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Circuit Breaker
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=10s

resilience4j.timelimiter.instances.default.timeout-duration=4s

# JWT
jwt.secret=revworkforcesupersecretkey2026revp3backendextralong
jwt.expiration=86400000

# Gateway Routes
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**, /api/auth/**

spring.cloud.gateway.routes[1].id=employee-management-service
spring.cloud.gateway.routes[1].uri=lb://employee-management-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/departments/**, /api/designations/**, /api/announcements/**

spring.cloud.gateway.routes[2].id=leave-service
spring.cloud.gateway.routes[2].uri=lb://leave-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/leaves/**

spring.cloud.gateway.routes[3].id=notification-service
spring.cloud.gateway.routes[3].uri=lb://notification-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[4].id=performance-service
spring.cloud.gateway.routes[4].uri=lb://performance-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/performance/**

spring.cloud.gateway.routes[5].id=reporting-service
spring.cloud.gateway.routes[5].uri=lb://reporting-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/reports/**, /api/activity/**

# Swagger Aggregation
springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=/api/users/v3/api-docs

springdoc.swagger-ui.urls[1].name=employee-management-service
springdoc.swagger-ui.urls[1].url=/employee-management-service/v3/api-docs

springdoc.swagger-ui.urls[2].name=leave-service
springdoc.swagger-ui.urls[2].url=/leave-service/v3/api-docs

springdoc.swagger-ui.urls[3].name=notification-service
springdoc.swagger-ui.urls[3].url=/notification-service/v3/api-docs

springdoc.swagger-ui.urls[4].name=performance-service
springdoc.swagger-ui.urls[4].url=/performance-service/v3/api-docs

springdoc.swagger-ui.urls[5].name=reporting-service
springdoc.swagger-ui.urls[5].url=/reporting-service/v3/api-docs

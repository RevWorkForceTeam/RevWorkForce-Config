spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Actuator
management.endpoints.web.exposure.include=*

# Gateway Discovery
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Circuit Breaker
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=10s

resilience4j.timelimiter.instances.default.timeout-duration=4s

# JWT
jwt.secret=revworkforcesupersecretkey2026revp3backendextralong
jwt.expiration=86400000

# Swagger Aggregation
springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs

springdoc.swagger-ui.urls[1].name=employee-management-service
springdoc.swagger-ui.urls[1].url=/employee-management-service/v3/api-docs

springdoc.swagger-ui.urls[2].name=leave-service
springdoc.swagger-ui.urls[2].url=/leave-service/v3/api-docs

springdoc.swagger-ui.urls[3].name=notification-service
springdoc.swagger-ui.urls[3].url=/notification-service/v3/api-docs

springdoc.swagger-ui.urls[4].name=performance-service
springdoc.swagger-ui.urls[4].url=/performance-service/v3/api-docs

springdoc.swagger-ui.urls[5].name=reporting-service
springdoc.swagger-ui.urls[5].url=/reporting-service/v3/api-docs
